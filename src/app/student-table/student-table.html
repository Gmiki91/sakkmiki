<div class="chess-container">
  <mat-card>
    <mat-card-content>
      <div class="board-wrapper">
        <app-chess-board #chessBoard >
        </app-chess-board>
      </div>
      <mat-card-content>
        <p>
          {{ status() }}
        </p>
      </mat-card-content>
      <mat-card-actions class="button-group">
        <button mat-raised-button color="accent" (click)="undo()">
          <mat-icon>undo</mat-icon>
          Undo
        </button>
        <mat-form-field appearance="outline">
          <mat-label>FEN Position</mat-label>
          <input matInput [(ngModel)]="fen" name="fen" />
        </mat-form-field>
        <button mat-raised-button color="accent" (click)="loadFen()">
          <mat-icon>upload</mat-icon>
          Load FEN
        </button>
      </mat-card-actions>
    </mat-card-content>
  </mat-card>
</div>
