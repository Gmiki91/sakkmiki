<div class="join-wrapper">
  <mat-card class="join-card">
    <mat-card-header>
      <mat-card-title>Join Class</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Your name</mat-label>
        <input
          matInput
          [ngModel]="name()"
          (ngModelChange)="name.set($event)"
          (keydown)="onKeydown($event)"
          placeholder="e.g. Ádám"
          autofocus
        />
      </mat-form-field>
      @if (error()) {
        <p class="error">{{ error() }}</p>
      }
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" class="full-width" (click)="join()">
        Join
      </button>
    </mat-card-actions>
  </mat-card>
</div>
