<div class="chess-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        @if (realtimeService.mode() === 'gathered') {
          <span class="gathered-label">📡 Following teacher</span>
        } @else {
          {{ currentExercise()?.title }} 
        }
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <div class="board-wrapper">
          <app-chess-board #chessBoard [config]="boardConfig()!"></app-chess-board>
        </div>

      <div class="feedback">
        <span>{{ status() }}</span>
        @if (realtimeService.mode() === 'normal') {
          <span>{{ feedback() }}</span>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>
