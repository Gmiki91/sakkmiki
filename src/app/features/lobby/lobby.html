<div class="lobby">
  <h1>Welcome to Chess Trainer</h1>
  
  <mat-card>
    <mat-card-header>
      <mat-card-title>Storage Room</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>Create and manage your exercises</p>
      <button mat-raised-button color="primary" routerLink="/exercises">
        <mat-icon>storage</mat-icon>
        Go to Exercises
      </button>
    </mat-card-content>
  </mat-card>
  
  <mat-card>
    <mat-card-header>
      <mat-card-title>Classrooms</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <button mat-raised-button color="primary" routerLink="/classroom">
        Go to Class
      </button>
    </mat-card-content>
  </mat-card>
</div>
